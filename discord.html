    <style>
        :root {

        }

        h1, h2, h3, .header-title { font-family: 'Outfit', sans-serif; }

        .header-wrapper { position: sticky; top: 20px; z-index: 1000; display: flex; justify-content: center; padding: 0 20px; pointer-events: none; }
        .header { pointer-events: auto; width: 100%; max-width: 1000px; display: flex; justify-content: space-between; align-items: center; padding: 10px 25px; background: rgba(15, 15, 20, 0.5); backdrop-filter: blur(24px); border: 1px solid var(--border-glass); border-radius: 50px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .logo-group { display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit; transition: 0.3s;}
        .logo-group:hover { transform: scale(1.05); }
        .logo-img { width: 42px; height: 42px; filter: drop-shadow(0 0 10px rgba(88, 101, 242, 0.4)); }

        .hamburger { cursor: pointer; width: 28px; height: 22px; position: relative; z-index: 1002; display: flex; flex-direction: column; justify-content: space-between; }

        .hamburger.active div:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.active div:nth-child(2) { opacity: 0; }
        .hamburger.active div:nth-child(3) { transform: rotate(-45deg) translate(7px, -7px); }

        .menu-box { position: fixed; top: 0; right: -350px; width: 320px; height: 100vh; background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(30px); padding: 100px 25px 40px; display: flex; flex-direction: column; gap: 12px; transition: 0.5s; border-left: 1px solid var(--border-glass); z-index: 1001; }
        .menu-box.show { right: 0; }
        .menu-box a { color: var(--text-main); text-decoration: none; font-size: 16px; font-weight: 600; padding: 14px 18px; border-radius: 14px; transition: 0.3s; display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.02); border: 1px solid transparent; }
        .menu-box a:hover, .menu-box a.active { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.25); color: #fff; transform: translateX(8px); }
        .menu-box a i { width: 25px; text-align: center; color: var(--brand-blurple); font-size: 18px; }
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); z-index: 1000; opacity: 0; visibility: hidden; transition: 0.4s; }
        .menu-overlay.show { opacity: 1; visibility: visible; }
        .main-content { 
            flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 60px 20px; z-index: 10; position: relative; width: 100%; 
        }

        .redirect-card {
            background: var(--bg-glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-glass); border-radius: 40px;
            padding: 60px 40px; text-align: center;
            max-width: 500px; width: 100%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            animation: popIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            position: relative;
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9) translateY(40px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .icon-wrapper {
            position: relative;
            width: 120px; height: 120px;
            margin: 0 auto 30px;
            display: flex; align-items: center; justify-content: center;
        }

        .discord-icon {
            font-size: 70px; color: #fff; z-index: 2;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.5));
            animation: floatIcon 3s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px) scale(1.05); }
        }

        .icon-wrapper::before, .icon-wrapper::after {
            content: ''; position: absolute; inset: 0; border-radius: 50%;
            background: var(--brand-blurple); z-index: 1;
            animation: pulseWave 2s cubic-bezier(0.16, 1, 0.3, 1) infinite;
        }
        .icon-wrapper::after { animation-delay: 1s; background: var(--brand-blue); }

        @keyframes pulseWave {
            0% { transform: scale(0.8); opacity: 0.8; }
            100% { transform: scale(1.8); opacity: 0; }
        }

        .redirect-title {
            font-size: 32px; font-weight: 900; margin-bottom: 15px;
            background: linear-gradient(135deg, #fff 0%, var(--brand-blue) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px var(--glow-cyan);
            letter-spacing: -0.5px;
        }

        .redirect-desc {

        }

        .discord-btn {

            background: linear-gradient(135deg, var(--brand-blurple) 0%, #7289da 100%); 
            color: #fff; text-decoration: none;
            padding: 16px 40px; border-radius: 50px; font-size: 18px; font-weight: 900; font-family: 'Outfit';
            transition: 0.4s; box-shadow: 0 10px 30px rgba(88, 101, 242, 0.4);
            text-transform: uppercase; letter-spacing: 1px; width: 100%;
        }
        .discord-btn:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 40px rgba(88, 101, 242, 0.6); 
            filter: brightness(1.1);
        }
        .discord-btn i { transition: transform 0.4s; font-size: 20px; }
        .discord-btn:hover i { transform: translateX(8px); }
        footer {

        }

        @media (max-width: 768px) {

            .redirect-title { font-size: 28px; }
        }
